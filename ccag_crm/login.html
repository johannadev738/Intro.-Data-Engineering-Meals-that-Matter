<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CCAG CRM Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f4f6f9;
padding:16px;
}

.login-box{
width:100%;
max-width:400px;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

@media (max-width: 480px) {
.login-box{
padding:24px;
}
}

h1, h2{
text-align:center;
margin-bottom:30px;
color:#CC5500;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:14px;
border:none;
background:#CC5500;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#a94400;
}

#message{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.small{
text-align:center;
margin-top:20px;
font-size:14px;
}

a{
color:#CC5500;
cursor:pointer;
}
</style>
</head>
<body>

<div class="login-box">

<h1>CCAG CRM</h1>
<h2>Log In</h2>

<input
type="email"
id="email"
placeholder="Email"
/>

<input
type="password"
id="password"
placeholder="Password"
/>

<button onclick="login()">
Login
</button>

<p id="message"></p>

</div>

<script>
const supabaseApi = window.ccagSupabase;

if (!supabaseApi) {
document.getElementById("message").innerHTML =
"Supabase failed to initialize. Check js/supabase.js.";
}

supabaseApi.getSession()
.then((session) => {
if (session) {
window.location.href = "index.html";
}
})
.catch((error) => {
console.error("Session check failed:", error);
});

async function login(){

let email=
document.getElementById("email").value;

let password=
document.getElementById("password").value;

try {
await supabaseApi.signInWithPassword(
email,
password
);

window.location.href="index.html";
} catch (error) {
document.getElementById("message").innerHTML=
error.message;
return;
}

}
</script>

</body>
</html>
