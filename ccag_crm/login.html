<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CCAG CRM Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f4f6f9;
padding:16px;
}

.login-box{
width:100%;
max-width:400px;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

@media (max-width: 480px) {
.login-box{
padding:24px;
}
}

h1, h2{
text-align:center;
margin-bottom:30px;
color:#CC5500;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:14px;
border:none;
background:#CC5500;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#a94400;
}

.btn-secondary{
margin-top:10px;
background:#3a3a3a;
}

.btn-secondary:hover{
background:#1f1f1f;
}

#message{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.small{
text-align:center;
margin-top:20px;
font-size:14px;
}

a{
color:#CC5500;
cursor:pointer;
}
</style>
</head>
<body>

<div class="login-box">

<h1>CCAG CRM</h1>
<h2>Log In</h2>

<form id="loginForm">
<input
type="email"
id="email"
placeholder="Email"
/>

<input
type="password"
id="password"
placeholder="Password"
/>

<button id="loginButton" type="submit">
Login
</button>

<button id="signupButton" type="button" class="btn-secondary">
Create Account
</button>
</form>

<p id="message"></p>

</div>

<script>
const supabaseApi = window.ccagSupabase;
const messageEl = document.getElementById("message");
const loginForm = document.getElementById("loginForm");
const loginButton = document.getElementById("loginButton");
const signupButton = document.getElementById("signupButton");

function setMessage(text, color) {
messageEl.textContent = text;
messageEl.style.color = color || "#b00020";
}

if (!supabaseApi) {
setMessage("Supabase failed to initialize. Check internet and js/supabase.js.");
if (loginButton) {
loginButton.disabled = true;
loginButton.style.opacity = "0.6";
loginButton.style.cursor = "not-allowed";
}
} else {
supabaseApi.getSession()
.then((session) => {
if (session) {
window.location.href = "index.html";
}
})
.catch((error) => {
console.error("Session check failed:", error);
setMessage("Could not verify session. Please try again.");
});
}

async function login(event){
if (event) event.preventDefault();

if (!supabaseApi) {
setMessage("Login is unavailable until Supabase initializes.");
return;
}

let email=
document.getElementById("email").value;

let password=
document.getElementById("password").value;

email = email.trim();

if (!email || !password) {
setMessage("Please enter both email and password.");
return;
}

try {
if (loginButton) loginButton.disabled = true;
setMessage("Signing in...", "#CC5500");

await supabaseApi.signInWithPassword(
email,
password
);

window.location.href="index.html";
} catch (error) {
setMessage(error.message || "Login failed. Please try again.");
return;
} finally {
if (loginButton) loginButton.disabled = false;
}
}

async function signUp(){
if (!supabaseApi) {
setMessage("Sign up is unavailable until Supabase initializes.");
return;
}

let email=
document.getElementById("email").value;

let password=
document.getElementById("password").value;

email = email.trim();

if (!email || !password) {
setMessage("Enter email and password, then click Create Account.");
return;
}

if (password.length < 6) {
setMessage("Password must be at least 6 characters.");
return;
}

try {
if (signupButton) signupButton.disabled = true;
setMessage("Creating account...", "#CC5500");

await supabaseApi.signUp(
email,
password
);

setMessage(
"Account created. If email confirmation is enabled, verify email then log in.",
"#1f7a1f"
);
} catch (error) {
setMessage(error.message || "Could not create account. Please try again.");
} finally {
if (signupButton) signupButton.disabled = false;
}
}

if (loginForm) {
loginForm.addEventListener("submit", login);
}

if (signupButton) {
signupButton.addEventListener("click", signUp);
}
</script>

</body>
</html>
